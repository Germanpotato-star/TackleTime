<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tackle Time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
body{background:#4A90E2;color:white;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
.container{width:100%;max-width:450px;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);border-radius:20px;padding:25px;}
h1{text-align:center;font-size:32px;margin-bottom:20px;}
.mode-title{text-align:center;font-size:24px;margin-bottom:20px;}
.time-display{text-align:center;font-size:50px;font-weight:bold;margin:20px 0;}
input, select{width:100%;padding:12px;border:none;border-radius:10px;font-size:16px;margin-bottom:12px;}
.controls{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;}
.alarm-row{margin-bottom:12px;} /* small space between alarm rows */
button{border:none;border-radius:10px;padding:12px 18px;cursor:pointer;font-size:16px;background:white;color:#4A90E2;font-weight:bold;}
.status{text-align:center;margin-top:10px;font-size:14px;opacity:0.95}
.hidden{display:none;}
.mode-button{position:fixed;right:20px;bottom:20px;width:70px;height:70px;border-radius:50%;border:none;background:white;color:#4A90E2;font-size:28px;font-weight:bold;cursor:pointer;}
.world-clock{margin-top:30px;}
.world-clock h2{text-align:center;margin-bottom:15px;}
.clock-box{background:rgba(255,255,255,0.12);border-radius:10px;padding:10px;margin-bottom:10px;}
.clock-time{margin-top:5px;text-align:center;font-size:18px;}
</style>
</head>
<body>
<div class="container">
  <h1>Tackle Time</h1>

  <!-- ALARM -->
  <div id="alarmPage">
    <div class="mode-title">Alarm</div>
    <input type="time" id="alarmTime">

    <!-- Row 1: Set / Clear -->
    <div class="controls alarm-row">
      <button onclick="setAlarm()">Set Alarm</button>
      <button onclick="clearAlarm()">Clear</button>
    </div>

    <!-- Row 2: Test / Stop -->
    <div class="controls alarm-row">
      <button onclick="testSound()">Test Sound</button>
      <button onclick="stopSound()">Stop Sound</button>
    </div>

    <div class="status" id="alarmStatus">No alarm set</div>
  </div>

  <!-- TIMER -->
  <div id="timerPage" class="hidden">
    <div class="mode-title">Timer</div>
    <input type="number" id="timerMinutes" min="1" placeholder="Enter minutes">
    <div class="time-display" id="timerDisplay">00:00</div>
    <div class="controls">
      <button onclick="startTimer()">Start</button>
      <button onclick="pauseTimer()">Pause</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>

  <!-- STOPWATCH -->
  <div id="stopwatchPage" class="hidden">
    <div class="mode-title">Stopwatch</div>
    <div class="time-display" id="stopwatchDisplay">00:00:00</div>
    <div class="controls">
      <button onclick="startStopwatch()">Start</button>
      <button onclick="stopStopwatch()">Stop</button>
      <button onclick="resetStopwatch()">Reset</button>
    </div>
  </div>

  <!-- WORLD CLOCK -->
  <div class="world-clock">
    <h2>World Clock</h2>
    <div class="clock-box">
      <select id="country1">
        <option value="">Choose Country 1</option>
        <option value="Asia/Tokyo">Japan</option>
        <option value="Europe/London">United Kingdom</option>
        <option value="America/New_York">USA</option>
        <option value="Europe/Berlin">Germany</option>
        <option value="Australia/Sydney">Australia</option>
      </select>
      <div class="clock-time" id="clock1">--:--:--</div>
    </div>
    <div class="clock-box">
      <select id="country2">
        <option value="">Choose Country 2</option>
        <option value="Asia/Tokyo">Japan</option>
        <option value="Europe/London">United Kingdom</option>
        <option value="America/New_York">USA</option>
        <option value="Europe/Berlin">Germany</option>
        <option value="Australia/Sydney">Australia</option>
      </select>
      <div class="clock-time" id="clock2">--:--:--</div>
    </div>
    <div class="clock-box">
      <select id="country3">
        <option value="">Choose Country 3</option>
        <option value="Asia/Tokyo">Japan</option>
        <option value="Europe/London">United Kingdom</option>
        <option value="America/New_York">USA</option>
        <option value="Europe/Berlin">Germany</option>
      </select>
      <div class="clock-time" id="clock3">--:--:--</div>
    </div>
  </div>
</div>

<button class="mode-button" onclick="changeMode()">⇄</button>

<audio id="alarmSound" src="alarm.1wav" preload="auto"></audio>

<script>
let currentMode = 0;
const pages = [
  document.getElementById("alarmPage"),
  document.getElementById("timerPage"),
  document.getElementById("stopwatchPage")
];

function changeMode(){
  pages[currentMode].classList.add("hidden");
  currentMode = (currentMode + 1) % pages.length;
  pages[currentMode].classList.remove("hidden");
}

/* ---------- Audio helpers ---------- */
const soundEl = document.getElementById("alarmSound");
let userInteracted = false;

// Unlock audio on first user tap/click (needed on mobile)
function ensureAudioUnlocked(){
  if (userInteracted) return Promise.resolve();
  userInteracted = true;

  // Try quick play/pause to satisfy autoplay rules
  try{
    const p = soundEl.play();
    if (p && typeof p.then === "function") {
      return p.then(()=>{ soundEl.pause(); soundEl.currentTime = 0; }).catch(()=>{});
    }
  }catch(e){}
  // Fallback: resume AudioContext
  if (window.AudioContext || window.webkitAudioContext) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") {
      return ctx.resume().catch(()=>{});
    }
  }
  return Promise.resolve();
}

window.addEventListener("click", ensureAudioUnlocked, { once:true });
window.addEventListener("touchstart", ensureAudioUnlocked, { once:true });

function playLoopFor5s(){
  ensureAudioUnlocked().then(()=>{
    try{
      soundEl.currentTime = 0;
      soundEl.loop = true;
      const p = soundEl.play();
      if (p && typeof p.then === "function") {
        p.catch(err=>console.error("Play error:", err));
      }
      setTimeout(stopSound, 5000);
    }catch(err){
      console.error("Play error:", err);
    }
  });
}

function playSound(loop=true){
  ensureAudioUnlocked().then(()=>{
    try{
      soundEl.loop = loop;
      const p = soundEl.play();
      if (p && typeof p.then === "function") {
        p.catch(err=>console.error("Play error:", err));
      }
    }catch(err){
      console.error("Play error:", err);
    }
  });
}

function stopSound(){
  try{
    soundEl.pause();
    soundEl.currentTime = 0;
    soundEl.loop = false;
  }catch(e){}
}

function testSound(){
  ensureAudioUnlocked().then(()=>{
    stopSound();
    playSound(false);
  });
}

/* ---------------- ALARM ---------------- */
let alarmTime = null;
let alarmTriggered = false;

function setAlarm(){
  alarmTime = document.getElementById("alarmTime").value;
  alarmTriggered = false;
  document.getElementById("alarmStatus").textContent =
    alarmTime ? ("Alarm set for " + alarmTime) : "Please choose a time.";
}

function clearAlarm(){
  alarmTime = null;
  alarmTriggered = false;
  document.getElementById("alarmStatus").textContent = "No alarm set";
  stopSound();
}

setInterval(function(){
  if(!alarmTime || alarmTriggered) return;
  const now = new Date();
  const current = String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");
  if(current === alarmTime){
    alarmTriggered = true;
    // Alarm: play continuously and alert
    playSound(true);
    alert("It's time!");
  }
}, 1000);

/* ---------------- TIMER ---------------- */
let timerSeconds = 0;
let timerInterval = null;

function startTimer(){
  if(timerInterval) return;
  if(timerSeconds === 0){
    const minutes = parseInt(document.getElementById("timerMinutes").value);
    if(!minutes || minutes <= 0){
      alert("Please enter minutes.");
      return;
    }
    timerSeconds = minutes * 60;
  }
  updateTimerDisplay();
  timerInterval = setInterval(function(){
    timerSeconds--;
    if (timerSeconds <= 0) {
      timerSeconds = 0;
      updateTimerDisplay();
      clearInterval(timerInterval);
      timerInterval = null;
      // Play immediately, no alert, stop after 5s
      playLoopFor5s();
      return;
    }
    updateTimerDisplay();
  },1000);
}

function pauseTimer(){
  clearInterval(timerInterval);
  timerInterval = null;
}

function resetTimer(){
  clearInterval(timerInterval);
  timerInterval = null;
  timerSeconds = 0;
  document.getElementById("timerDisplay").textContent = "00:00";
  stopSound();
}

function updateTimerDisplay(){
  const minutes = Math.floor(timerSeconds / 60);
  const seconds = timerSeconds % 60;
  document.getElementById("timerDisplay").textContent =
    String(minutes).padStart(2,"0") + ":" + String(seconds).padStart(2,"0");
}

/* ---------------- STOPWATCH ---------------- */
let stopwatchTime = 0; // centiseconds
let stopwatchInterval = null;

function startStopwatch(){
  if(stopwatchInterval) return;
  stopwatchInterval = setInterval(function(){
    stopwatchTime++;
    updateStopwatch();
  },10);
}

function stopStopwatch(){
  clearInterval(stopwatchInterval);
  stopwatchInterval = null;
}

function resetStopwatch(){
  clearInterval(stopwatchInterval);
  stopwatchInterval = null;
  stopwatchTime = 0;
  updateStopwatch();
}

function updateStopwatch(){
  let minutes = Math.floor(stopwatchTime / 6000);
  let seconds = Math.floor((stopwatchTime % 6000) / 100);
  let centiseconds = stopwatchTime % 100;
  document.getElementById("stopwatchDisplay").textContent =
    String(minutes).padStart(2,"0") + ":" +
    String(seconds).padStart(2,"0") + ":" +
    String(centiseconds).padStart(2,"0");
}

/* ---------------- WORLD CLOCK ---------------- */
function updateClock(selectId, outputId){
  const zone = document.getElementById(selectId).value;
  if(zone === ""){
    document.getElementById(outputId).textContent = "--:--:--";
    return;
  }
  const time = new Date().toLocaleTimeString("en-GB",{ timeZone: zone });
  document.getElementById(outputId).textContent = time;
}
function updateWorldClocks(){
  updateClock("country1","clock1");
  updateClock("country2","clock2");
  updateClock("country3","clock3");
}
setInterval(updateWorldClocks,1000);
updateWorldClocks();
updateStopwatch();
</script>
</body>
</html>
