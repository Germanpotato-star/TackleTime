<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tackle Time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
body{background:#4A90E2;color:white;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
.container{width:100%;max-width:520px;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);border-radius:14px;padding:20px;}
h1{text-align:center;font-size:28px;margin-bottom:12px;}
.mode-title{text-align:center;font-size:20px;margin-bottom:10px;}
.time-display{text-align:center;font-size:44px;font-weight:bold;margin:14px 0;}
input, select{width:100%;padding:10px;border:none;border-radius:8px;font-size:16px;margin-bottom:10px;}
.controls{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:8px;}
.alarm-row{margin-bottom:10px;}
button{border:none;border-radius:8px;padding:10px 14px;cursor:pointer;font-size:15px;background:white;color:#4A90E2;font-weight:bold;}
.status{text-align:center;margin-top:8px;font-size:13px;opacity:0.95}
.mode-button{position:fixed;right:16px;bottom:16px;width:60px;height:60px;border-radius:50%;border:none;background:white;color:#4A90E2;font-size:22px;font-weight:bold;cursor:pointer;}
.world-clock{margin-top:18px;}
.clock-box{background:rgba(255,255,255,0.12);border-radius:10px;padding:10px;margin-bottom:10px;}
.clock-time{text-align:center;font-size:16px;margin-top:6px;}
.enable-row{text-align:center;margin:10px 0;}
</style>
</head>
<body>
<div class="container">
  <h1>Tackle Time</h1>

  <div class="enable-row">
    <button id="enableSoundBtn">Enable Sound (Click once)</button>
    <div class="status" id="enableStatus">Click this once to allow alarms/timer sounds.</div>
  </div>

  <!-- ALARM -->
  <div id="alarmPage">
    <div class="mode-title">Alarm</div>
    <input type="time" id="alarmTime">
    <div class="controls alarm-row">
      <button onclick="setAlarm()">Set Alarm</button>
      <button onclick="clearAlarm()">Clear</button>
    </div>
    <div class="controls alarm-row">
      <button onclick="testSound()">Test Sound</button>
      <button onclick="stopSound()">Stop Sound</button>
    </div>
    <div class="status" id="alarmStatus">No alarm set</div>
  </div>

  <!-- TIMER -->
  <div id="timerPage" class="hidden">
    <div class="mode-title">Timer</div>
    <input type="number" id="timerMinutes" min="1" placeholder="Enter minutes">
    <div class="time-display" id="timerDisplay">00:00</div>
    <div class="controls">
      <button onclick="startTimer()">Start</button>
      <button onclick="pauseTimer()">Pause</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>

  <!-- STOPWATCH -->
  <div id="stopwatchPage" class="hidden">
    <div class="mode-title">Stopwatch</div>
    <div class="time-display" id="stopwatchDisplay">00:00:00</div>
    <div class="controls">
      <button onclick="startStopwatch()">Start</button>
      <button onclick="stopStopwatch()">Stop</button>
      <button onclick="resetStopwatch()">Reset</button>
    </div>
  </div>

  <!-- WORLD CLOCK -->
  <div class="world-clock">
    <h2 style="text-align:center;margin-bottom:8px;">World Clock</h2>
    <div class="clock-box">
      <select id="country1">
        <option value="">Choose Country 1</option>
        <option value="Asia/Tokyo">Japan</option>
        <option value="Europe/London">United Kingdom</option>
        <option value="America/New_York">USA</option>
        <option value="Europe/Berlin">Germany</option>
        <option value="Australia/Sydney">Australia</option>
      </select>
      <div class="clock-time" id="clock1">--:--:--</div>
    </div>
    <div class="clock-box">
      <select id="country2">
        <option value="">Choose Country 2</option>
        <option value="Asia/Tokyo">Japan</option>
        <option value="Europe/London">United Kingdom</option>
        <option value="America/New_York">USA</option>
        <option value="Europe/Berlin">Germany</option>
        <option value="Australia/Sydney">Australia</option>
      </select>
      <div class="clock-time" id="clock2">--:--:--</div>
    </div>
    <div class="clock-box">
      <select id="country3">
        <option value="">Choose Country 3</option>
        <option value="Asia/Tokyo">Japan</option>
        <option value="Europe/London">United Kingdom</option>
        <option value="America/New_York">USA</option>
        <option value="Europe/Berlin">Germany</option>
      </select>
      <div class="clock-time" id="clock3">--:--:--</div>
    </div>
  </div>
</div>

<button class="mode-button" onclick="changeMode()">⇄</button>

<!-- Place alarm1.wav next to this HTML file -->
<audio id="alarmSound" src="alarm1.wav" preload="auto"></audio>

<script>
/* UI pages */
let currentMode = 0;
const pages = [
  document.getElementById('alarmPage'),
  document.getElementById('timerPage'),
  document.getElementById('stopwatchPage')
];
function changeMode(){
  pages[currentMode].classList.add('hidden');
  currentMode = (currentMode + 1) % pages.length;
  pages[currentMode].classList.remove('hidden');
}

/* Audio element and unlocking */
const soundEl = document.getElementById('alarmSound');
const enableBtn = document.getElementById('enableSoundBtn');
const enableStatus = document.getElementById('enableStatus');
let audioUnlocked = false;
let autoStopTimeoutId = null;

function ensureAudioUnlocked(){
  if (audioUnlocked) return Promise.resolve();
  return new Promise((resolve) => {
    try {
      soundEl.currentTime = 0;
      const p = soundEl.play();
      if (p && typeof p.then === 'function') {
        p.then(()=>{ soundEl.pause(); soundEl.currentTime = 0; audioUnlocked = true; enableStatus.textContent = 'Sound enabled'; resolve(); })
         .catch(()=>{ audioUnlocked = true; enableStatus.textContent = 'Sound enabled'; resolve(); });
        return;
      }
    } catch(e){}
    audioUnlocked = true;
    enableStatus.textContent = 'Sound enabled';
    resolve();
  });
}

enableBtn.addEventListener('click', () => { ensureAudioUnlocked(); });

/* Sound helpers */
function startPlaying(loop=true, autoStopMs=0){
  return ensureAudioUnlocked().then(()=>{
    try{
      // clear previous auto-stop if any
      if (autoStopTimeoutId) { clearTimeout(autoStopTimeoutId); autoStopTimeoutId = null; }
      soundEl.loop = loop;
      soundEl.currentTime = 0;
      const p = soundEl.play();
      if (p && typeof p.then === 'function') {
        p.catch(err => console.error('play() error:', err));
      }
      if (autoStopMs > 0){
        autoStopTimeoutId = setTimeout(() => {
          stopSound();
          autoStopTimeoutId = null;
        }, autoStopMs);
      }
    }catch(e){ console.error(e); }
  });
}

function playSound(loop=true){ return startPlaying(loop, 0); } // continuous until stop
function playSoundFor5s(){ return startPlaying(true, 5000); } // loop and stop after 5s

function stopSound(){
  try{
    if (autoStopTimeoutId){ clearTimeout(autoStopTimeoutId); autoStopTimeoutId = null; }
    soundEl.pause();
    soundEl.currentTime = 0;
    soundEl.loop = false;
  }catch(e){ console.error(e); }
}

function testSound(){ playSoundFor5s(); }

/* ---------------- ALARM ---------------- */
let alarmTime = null;
let alarmTriggered = false;

function setAlarm(){
  alarmTime = document.getElementById('alarmTime').value;
  alarmTriggered = false;
  document.getElementById('alarmStatus').textContent = alarmTime ? ('Alarm set for ' + alarmTime) : 'Please choose a time.';
}

function clearAlarm(){
  alarmTime = null;
  alarmTriggered = false;
  document.getElementById('alarmStatus').textContent = 'No alarm set';
  stopSound();
}

/* Alarm: now auto-stops after 5s */
setInterval(() => {
  if (!alarmTime || alarmTriggered) return;
  const now = new Date();
  const current = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  if (current === alarmTime){
    alarmTriggered = true;
    // Play for 5 seconds then stop
    playSoundFor5s();
  }
}, 1000);

/* ---------------- TIMER ---------------- */
let timerSeconds = 0;
let timerInterval = null;

function updateTimerDisplay(){
  const minutes = Math.floor(timerSeconds / 60);
  const seconds = timerSeconds % 60;
  document.getElementById('timerDisplay').textContent =
    String(minutes).padStart(2,'0') + ':' + String(seconds).padStart(2,'0');
}

function startTimer(){
  if (timerInterval) return;
  if (timerSeconds === 0){
    const minutes = parseInt(document.getElementById('timerMinutes').value, 10);
    if (!minutes || minutes <= 0){ alert('Please enter minutes.'); return; }
    timerSeconds = minutes * 60;
  }
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    if (timerSeconds <= 0){
      timerSeconds = 0;
      updateTimerDisplay();
      clearInterval(timerInterval);
      timerInterval = null;
      // Play sound for 5 seconds
      playSoundFor5s();
      return;
    }
    updateTimerDisplay();
  }, 1000);
}

function pauseTimer(){
  clearInterval(timerInterval);
  timerInterval = null;
}

function resetTimer(){
  clearInterval(timerInterval);
  timerInterval = null;
  timerSeconds = 0;
  updateTimerDisplay();
  stopSound();
}

/* ---------------- STOPWATCH ---------------- */
let stopwatchTime = 0; // centiseconds
let stopwatchInterval = null;

function updateStopwatch(){
  const minutes = Math.floor(stopwatchTime / 6000);
  const seconds = Math.floor((stopwatchTime % 6000) / 100);
  const centis = stopwatchTime % 100;
  document.getElementById('stopwatchDisplay').textContent =
    String(minutes).padStart(2,'0') + ':' + String(seconds).padStart(2,'0') + ':' + String(centis).padStart(2,'0');
}

function startStopwatch(){
  if (stopwatchInterval) return;
  stopwatchInterval = setInterval(() => {
    stopwatchTime++;
    updateStopwatch();
  }, 10);
}

function stopStopwatch(){
  clearInterval(stopwatchInterval);
  stopwatchInterval = null;
}

function resetStopwatch(){
  clearInterval(stopwatchInterval);
  stopwatchInterval = null;
  stopwatchTime = 0;
  updateStopwatch();
}

/* ---------------- WORLD CLOCK ---------------- */
function updateClock(selectId, outputId){
  const zone = document.getElementById(selectId).value;
  if (!zone){ document.getElementById(outputId).textContent = '--:--:--'; return; }
  const time = new Date().toLocaleTimeString('en-GB', { timeZone: zone });
  document.getElementById(outputId).textContent = time;
}
function updateWorldClocks(){ updateClock('country1','clock1'); updateClock('country2','clock2'); updateClock('country3','clock3'); }
setInterval(updateWorldClocks, 1000);
updateWorldClocks();
updateStopwatch();
</script>
</body>
</html>
