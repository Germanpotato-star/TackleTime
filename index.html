<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Time App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#4a90e2;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    font-size:28px;
}

.mode-title{
    text-align:center;
    margin-bottom:20px;
    font-size:24px;
}

.time-display{
    text-align:center;
    font-size:48px;
    font-weight:bold;
    margin:20px 0;
}

.controls{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:10px;
    padding:12px 18px;
    font-size:16px;
    cursor:pointer;
}

.main-btn{
    background:white;
    color:#4a90e2;
}

.input-row{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

input, select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.world-clock{
    margin-top:25px;
}

.world-clock h2{
    text-align:center;
    margin-bottom:10px;
}

.country-row{
    margin-bottom:10px;
}

.clock-item{
    background:rgba(255,255,255,0.15);
    padding:10px;
    border-radius:10px;
    margin-top:8px;
}

.mode-button{
    position:fixed;
    right:20px;
    bottom:20px;
    width:65px;
    height:65px;
    border-radius:50%;
    background:white;
    color:#4a90e2;
    font-size:28px;
    font-weight:bold;
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<div class="container">

    <h1>Blue Time</h1>

    <div id="alarmPage">
        <div class="mode-title">Alarm</div>

        <div class="input-row">
            <input type="time" id="alarmTime">
        </div>

        <div class="controls">
            <button class="main-btn" onclick="setAlarm()">Set Alarm</button>
            <button class="main-btn" onclick="clearAlarm()">Clear</button>
        </div>

        <p id="alarmStatus" style="text-align:center;margin-top:15px;"></p>
    </div>

    <div id="timerPage" class="hidden">
        <div class="mode-title">Timer</div>

        <div class="input-row">
            <input type="number" id="timerMinutes" placeholder="Minutes">
        </div>

        <div class="time-display" id="timerDisplay">00:00</div>

        <div class="controls">
            <button class="main-btn" onclick="startTimer()">Start</button>
            <button class="main-btn" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <div id="stopwatchPage" class="hidden">
        <div class="mode-title">Stopwatch</div>

        <div class="time-display" id="stopwatchDisplay">00:00:00</div>

        <div class="controls">
            <button class="main-btn" onclick="startStopwatch()">Start</button>
            <button class="main-btn" onclick="stopStopwatch()">Stop</button>
            <button class="main-btn" onclick="resetStopwatch()">Reset</button>
        </div>
    </div>

    <div class="world-clock">
        <h2>World Clock</h2>

        <div class="country-row">
            <select id="country1">
                <option value="">Choose Country 1</option>
                <option value="Europe/London">United Kingdom</option>
                <option value="America/New_York">USA</option>
                <option value="Asia/Tokyo">Japan</option>
                <option value="Europe/Berlin">Germany</option>
                <option value="Australia/Sydney">Australia</option>
            </select>
            <div class="clock-item" id="clock1">--:--:--</div>
        </div>

        <div class="country-row">
            <select id="country2">
                <option value="">Choose Country 2</option>
                <option value="Europe/London">United Kingdom</option>
                <option value="America/New_York">USA</option>
                <option value="Asia/Tokyo">Japan</option>
                <option value="Europe/Berlin">Germany</option>
                <option value="Australia/Sydney">Australia</option>
            </select>
            <div class="clock-item" id="clock2">--:--:--</div>
        </div>

        <div class="country-row">
            <select id="country3">
                <option value="">Choose Country 3</option>
                <option value="Europe/London">United Kingdom</option>
                <option value="America/New_York">USA</option>
                <option value="Asia/Tokyo">Japan</option>
                <option value="Europe/Berlin">Germany</option>
                <option value="Australia/Sydney">Australia</option>
            </select>
            <div class="clock-item" id="clock3">--:--:--</div>
        </div>
    </div>

</div>

<button class="mode-button" onclick="changeMode()">⇄</button>

<script>
let mode = 0;

const pages = [
    document.getElementById("alarmPage"),
    document.getElementById("timerPage"),
    document.getElementById("stopwatchPage")
];

function changeMode(){
    pages[mode].classList.add("hidden");
    mode = (mode + 1) % 3;
    pages[mode].classList.remove("hidden");
}

let alarmValue = null;

function setAlarm(){
    alarmValue = document.getElementById("alarmTime").value;
    document.getElementById("alarmStatus").textContent =
    "Alarm set for " + alarmValue;
}

function clearAlarm(){
    alarmValue = null;
    document.getElementById("alarmStatus").textContent =
    "Alarm cleared";
}

setInterval(() => {
    if(!alarmValue) return;

    const now = new Date();
    const current =
        String(now.getHours()).padStart(2,"0") +
        ":" +
        String(now.getMinutes()).padStart(2,"0");

    if(current === alarmValue){
        alert("Alarm!");
        alarmValue = null;
    }
},1000);

let timerSeconds = 0;
let timerRun = null;

function startTimer(){

    if(timerRun) return;

    if(timerSeconds === 0){
        timerSeconds =
        Number(document.getElementById("timerMinutes").value) * 60;
    }

    timerRun = setInterval(() => {

        if(timerSeconds <= 0){
            clearInterval(timerRun);
            timerRun = null;
            alert("Timer finished!");
            return;
        }

        timerSeconds--;
        updateTimerDisplay();

    },1000);

    updateTimerDisplay();
}

function resetTimer(){
    clearInterval(timerRun);
    timerRun = null;
    timerSeconds = 0;
    document.getElementById("timerDisplay").textContent = "00:00";
}

function updateTimerDisplay(){

    let min = Math.floor(timerSeconds / 60);
    let sec = timerSeconds % 60;

    document.getElementById("timerDisplay").textContent =
    String(min).padStart(2,"0") +
    ":" +
    String(sec).padStart(2,"0");
}

let stopwatchTime = 0;
let stopwatchRun = null;

function startStopwatch(){

    if(stopwatchRun) return;

    stopwatchRun = setInterval(() => {
        stopwatchTime++;
        updateStopwatch();
    },10);
}

function stopStopwatch(){
    clearInterval(stopwatchRun);
    stopwatchRun = null;
}

function resetStopwatch(){
    clearInterval(stopwatchRun);
    stopwatchRun = null;
    stopwatchTime = 0;
    updateStopwatch();
}

function updateStopwatch(){

    let minutes = Math.floor(stopwatchTime / 6000);
    let seconds = Math.floor((stopwatchTime % 6000) / 100);
    let centiseconds = stopwatchTime % 100;

    document.getElementById("stopwatchDisplay").textContent =
    String(minutes).padStart(2,"0") + ":" +
    String(seconds).padStart(2,"0") + ":" +
    String(centiseconds).padStart(2,"0");
}

function updateWorldClocks(){

    updateClock("country1","clock1");
    updateClock("country2","clock2");
    updateClock("country3","clock3");
}

function updateClock(selectId, clockId){

    const zone =
    document.getElementById(selectId).value;

    if(!zone){
        document.getElementById(clockId).textContent =
        "--:--:--";
        return;
    }

    const time =
    new Date().toLocaleTimeString("en-GB",{
        timeZone: zone
    });

    document.getElementById(clockId).textContent =
    time;
}

setInterval(updateWorldClocks,1000);
updateWorldClocks();
</script>

</body>
</html>
