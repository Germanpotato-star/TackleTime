<title>Tackle Time</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#4a90e2;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

.container{
    width:100%;
    max-width:450px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:25px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    font-size:32px;
}

.mode-title{
    text-align:center;
    font-size:24px;
    margin-bottom:20px;
}

.time-display{
    text-align:center;
    font-size:48px;
    font-weight:bold;
    margin:20px 0;
}

.controls{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}

button{
    border:none;
    border-radius:10px;
    padding:12px 18px;
    cursor:pointer;
    font-size:16px;
}

.main-btn{
    background:white;
    color:#4a90e2;
}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:12px;
    font-size:16px;
}

.hidden{
    display:none;
}

.mode-button{
    position:fixed;
    bottom:20px;
    right:20px;
    width:70px;
    height:70px;
    border-radius:50%;
    background:white;
    color:#4a90e2;
    font-size:28px;
    font-weight:bold;
}

.status{
    text-align:center;
    margin-top:15px;
    font-size:16px;
}

.world-clock{
    margin-top:25px;
}

.world-clock h2{
    text-align:center;
    margin-bottom:12px;
}

.clock-item{
    background:rgba(255,255,255,0.15);
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}
</style>
</head>
